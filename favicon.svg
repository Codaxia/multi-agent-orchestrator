<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" role="img" aria-label="Dashboard Agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#030811"/>
      <stop offset="100%" stop-color="#0b1430"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Circular arc: centre (215,280) r=130, ~240° sweep screen-clockwise -->
  <!-- Start at 150° SVG (8 o'clock / lower-left): (102, 345)            -->
  <!-- End   at 300° SVG (1 o'clock / upper-right): (280, 167)           -->
  <!-- sweep-flag=0 (counterclockwise in SVG maths = clockwise on screen) -->
  <path
    d="M 102 345 A 130 130 0 1 0 280 167"
    fill="none"
    stroke="white"
    stroke-width="54"
    stroke-linecap="butt"
  />

  <!-- Arrowhead at upper-right end of arc, pointing ~1 o'clock -->
  <polygon points="258,148  335,138  288,212" fill="white"/>

  <!-- 4-pointed sparkle star, centre (365, 158) -->
  <!-- vertical outer r=62, horizontal outer r=36, inner waist=6 -->
  <polygon
    points="
      365,96
      371,152
      401,158
      371,164
      365,224
      359,164
      329,158
      359,152
    "
    fill="white"
  />
</svg>
